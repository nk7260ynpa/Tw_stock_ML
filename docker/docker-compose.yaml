services:
  tw-stock-ml:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: tw-stock-ml
    restart: always
    expose:
      - "5002"
    volumes:
      - ../logs:/app/logs
      - ../src:/app/src
      - ../tests:/app/tests
      - ../data:/app/data
      - ../model:/app/model
    environment:
      - PYTHONUNBUFFERED=1
      - DB_HOST=tw_stock_database
      - DB_USER=root
      - DB_PASSWORD=stock
      - DB_NAME=TWSE
      # 透過 Dashboard 反向代理存取的根路徑；留空則為直接存取模式
      - SCRIPT_NAME=/app/ml
    command: python src/main.py --web
    networks:
      - db_network

networks:
  db_network:
    external: true
